                            { title: "Course Material Updated", time: "1 day ago", desc: "New resources have been added to Module 3: Visual Design Principles.", type: "update", read: true },
                            { title: "Achievement Unlocked!", time: "2 days ago", desc: "Congratulations! You've completed a 7-day learning streak.", type: "achievement", read: true }
                        ].map((notif, i) => (
                            <div key={i} class={`p-4 rounded-lg border ${notif.read ? 'bg-white dark:bg-slate-900 border-slate-100 dark:border-slate-800' : 'bg-primary/5 border-primary/20'} flex gap-4 transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 cursor-pointer`}>
                                <div class={`size-10 rounded-full flex items-center justify-center shrink-0 ${notif.type === 'grade' ? 'bg-green-100 text-green-600' : notif.type === 'class' ? 'bg-blue-100 text-blue-600' : notif.type === 'achievement' ? 'bg-amber-100 text-amber-600' : 'bg-slate-100 text-slate-600'}`}>
                                    <span class="material-symbols-outlined text-xl">
                                        {notif.type === 'grade' ? 'fact_check' : notif.type === 'class' ? 'videocam' : notif.type === 'achievement' ? 'emoji_events' : 'article'}
                                    </span>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-start justify-between gap-2 mb-1">
                                        <h4 class={`font-semibold text-sm sm:text-base ${notif.read ? 'text-slate-700 dark:text-slate-300' : 'text-slate-900 dark:text-white'}`}>{notif.title}</h4>
                                        <span class="text-xs text-slate-500 whitespace-nowrap">{notif.time}</span>
                                    </div>
                                    <p class="text-sm text-slate-600 dark:text-slate-400 line-clamp-2">{notif.desc}</p>
                                </div>
                                {!notif.read && <div class="w-2 h-2 rounded-full bg-primary shrink-0 mt-2"></div>}
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const ProfilePage = ({ onMenuClick }) => {
            const [activeTab, setActiveTab] = useState("About");
            const tabs = ["About", "Certificates", "Learning", "Teaching", "Settings", "Slots", "Schedule"];

            return (
                <div class="flex-1 overflow-y-auto custom-scrollbar relative z-0">
                    <Header title="Profile" subtitle="Manage your account" onMenuClick={onMenuClick} />
                    <div class="h-32 sm:h-48 bg-primary/20 relative">
                        <div class="absolute -bottom-12 sm:-bottom-16 left-4 sm:left-8 flex items-end gap-4 sm:gap-6">
                            <div class="size-24 sm:size-32 rounded-full border-4 border-background-light dark:border-background-dark bg-slate-200" style={{ backgroundImage: "url('https://lh3.googleusercontent.com/aida-public/AB6AXuAwhhf7efEdSKrfCPnnA3Ol8gDD7MdAFH1625R0dfxjQJbEmkxanTISHmd2MjQ05LOr59kb4fAmroE1Pcxz3wQYGUK4af_P3-88b5_bn4T7XiaYTCY54_zS7ewJdsdyIsUY5I8Xz6NDtvCIKJpFRdm8SJO9_H5vYCBXjWgt6hcKTprW-dnHE7q3gLZ_Y0FREDRmJNx_5CrCplUnFqu1fB5hwmsueSZHlFqKXXjAYMlncckbXipVSVP-U8l-oQXT3NFd94mOWMxDx0v1')", backgroundSize: 'cover' }}></div>
                            <div class="mb-2 sm:mb-4">
                                <h1 class="text-xl sm:text-3xl font-bold">Alex Johnson</h1>
                                <p class="text-xs sm:text-base text-slate-500 font-medium">Premium Student</p>
                            </div>
                        </div>
                        <div class="absolute bottom-4 right-4 sm:right-8">
                            <button class="bg-primary text-white px-4 sm:px-6 py-1.5 sm:py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-primary/90 transition-colors shadow-sm text-xs sm:text-sm">
                                <span class="material-symbols-outlined text-xs sm:text-sm">edit</span> Edit Profile
                            </button>
                        </div>
                    </div>
                    <div class="mt-16 sm:mt-24 px-4 sm:px-8 pb-8">
                        <div class="flex gap-4 sm:gap-6 border-b border-slate-200 dark:border-slate-800 mb-6 sm:mb-8 overflow-x-auto scrollbar-hide">
                            {tabs.map(tab => (
                                <button 
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    class={`pb-3 sm:pb-4 border-b-2 font-bold text-xs sm:text-sm whitespace-nowrap transition-all ${
                                        activeTab === tab ? "border-primary text-primary" : "border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300"
                                    }`}
                                >
                                    {tab}
                                </button>
                            ))}
                        </div>
                        <div class="bg-white dark:bg-slate-900 rounded-lg p-6 sm:p-8 border border-slate-100 dark:border-slate-800 shadow-sm min-h-[200px] sm:min-h-[300px]">
                            {activeTab === "About" && (
                                <div class="space-y-4">
                                    <h3 class="text-lg sm:text-xl font-bold">About Me</h3>
                                    <p class="text-sm sm:text-base text-slate-600 dark:text-slate-400 leading-relaxed max-w-3xl">
                                        Passionate learner with a focus on UI/UX design and frontend development. Currently mastering motion design and interactive prototyping. Always looking to collaborate on exciting projects and expand my skill set.
                                    </p>
                                    <div class="flex flex-col sm:flex-row gap-2 sm:gap-4 mt-4 sm:mt-6">
                                        <div class="flex items-center gap-2 text-sm sm:text-base text-slate-500">
                                            <span class="material-symbols-outlined text-lg">location_on</span> San Francisco, CA
                                        </div>
                                        <div class="flex items-center gap-2 text-sm sm:text-base text-slate-500">
                                            <span class="material-symbols-outlined text-lg">email</span> alex.j@example.com
                                        </div>
                                        <div class="flex items-center gap-2 text-sm sm:text-base text-slate-500">
                                            <span class="material-symbols-outlined text-lg">link</span> portfolio.com
                                        </div>
                                    </div>
                                </div>
                            )}
                            {activeTab !== "About" && (
                                <div class="flex items-center justify-center h-full text-slate-400 py-8 sm:py-12 text-sm sm:text-base">
                                    <p>{activeTab} content goes here...</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App ---

        const App = () => {
            const [darkMode, setDarkMode] = useState(true);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [darkMode]);

            return (
                <MemoryRouter>
                    <div class="flex h-screen overflow-hidden bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
                        <Sidebar isOpen={isMobileMenuOpen} setIsOpen={setIsMobileMenuOpen} />
                        <main class="flex-1 flex flex-col h-full overflow-hidden relative w-full">
                            {/* Theme Toggle Button */}
                            <button 
                                onClick={() => setDarkMode(!darkMode)}
                                class="fixed bottom-6 right-6 size-10 sm:size-12 rounded-full bg-white dark:bg-slate-800 shadow-xl border border-slate-200 dark:border-slate-700 flex items-center justify-center z-50 text-slate-600 dark:text-slate-400 hover:scale-110 transition-transform"
                            >
                                <span class="material-symbols-outlined text-lg sm:text-xl">
                                    {darkMode ? 'light_mode' : 'dark_mode'}
                                </span>
                            </button>

                            <div className="flex-1 overflow-hidden relative z-0 flex flex-col">
                                <Routes>
                                    <Route path="/" element={<DashboardPage onMenuClick={() => setIsMobileMenuOpen(true)} />} />
                                    <Route path="/batch" element={<BatchPage onMenuClick={() => setIsMobileMenuOpen(true)} />} />
                                    <Route path="/course-overview" element={<CourseOverviewPage onMenuClick={() => setIsMobileMenuOpen(true)} />} />
                                    <Route path="/lesson" element={<LessonPlayerPage onMenuClick={() => setIsMobileMenuOpen(true)} />} />
                                    <Route path="/billing" element={<BillingPage onMenuClick={() => setIsMobileMenuOpen(true)} />} />
                                    <Route path="/courses" element={<AllCoursesPage onMenuClick={() => setIsMobileMenuOpen(true)} />} />
                                    <Route path="/programs" element={<ProgramsPage onMenuClick={() => setIsMobileMenuOpen(true)} />} />
                                    <Route path="/classes" element={<ClassesPage onMenuClick={() => setIsMobileMenuOpen(true)} />} />
                                    <Route path="/profile" element={<ProfilePage onMenuClick={() => setIsMobileMenuOpen(true)} />} />
                                    <Route path="/notifications" element={<NotificationsPage onMenuClick={() => setIsMobileMenuOpen(true)} />} />
                                </Routes>
                            </div>
                        </main>
                    </div>
                </MemoryRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
